name: Test Release

on:
  pull_request:
    paths:
      - '.goreleaser.yml'
      - '.github/workflows/auto-release.yml'
      - '.github/workflows/test-release.yml'
      - 'Makefile'
      - 'cmd/floop/main.go'
      - 'cmd/floop/cmd_version.go'

permissions:
  contents: read

env:
  GORELEASER_VERSION: v2.14.1

jobs:
  test-release:
    name: Test Release Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Run GoReleaser in snapshot mode
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: build --snapshot --clean

      - name: Verify binaries
        run: |
          echo "Built binaries:"
          ls -lh dist/*/floop* 2>/dev/null || true

          echo ""
          echo "Testing Linux amd64 binary..."
          linux_bin=$(find dist -maxdepth 2 -name "floop" -path "*linux_amd64*" | head -1)
          test -n "$linux_bin" || { echo "linux_amd64 binary not found"; exit 1; }
          "$linux_bin" --version

          # Verify all 6 platform targets exist (goreleaser may add arch variant suffixes)
          for os_arch in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64 windows_amd64 windows_arm64; do
            found=$(find dist -maxdepth 1 -type d -name "floop_${os_arch}*" | head -1)
            if [ -n "$found" ]; then
              echo "  ${os_arch}: OK ($(basename "$found"))"
            else
              echo "  ${os_arch}: MISSING" && exit 1
            fi
          done

  test-cgo-build:
    name: Test CGO Build (LanceDB)
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install C++ toolchain
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Download Go modules
        run: go mod download

      - name: Cache LanceDB native libraries
        uses: actions/cache@v5
        with:
          path: |
            lib/
            include/
          key: lancedb-test-release-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.sum') }}

      - name: Download LanceDB native libraries
        shell: bash
        run: |
          PLATFORM="$(go env GOOS)_$(go env GOARCH)"
          if [ ! -f "lib/${PLATFORM}/liblancedb_go.a" ]; then
            rm -rf lib/ include/
            # go.mod has a replace directive pointing to nvandessel/lancedb-go (a fork with
            # patches not yet upstream). The version template resolves the replaced version so
            # we download binaries from the fork's releases, which is where they are published.
            LANCE_VERSION=$(go list -m -f '{{if .Replace}}{{.Replace.Version}}{{else}}{{.Version}}{{end}}' github.com/lancedb/lancedb-go)
            gh release download "${LANCE_VERSION}" \
              --repo nvandessel/lancedb-go \
              --pattern 'lancedb-go-native-binaries.tar.gz'
            tar -xzf lancedb-go-native-binaries.tar.gz
            rm -f lancedb-go-native-binaries.tar.gz
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache sproink build
        uses: actions/cache@v5
        with:
          path: sproink-build/target
          key: sproink-test-release-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/sproink/include/sproink.h') }}

      - name: Build sproink native library
        shell: bash
        run: |
          if [ ! -f "sproink-build/Cargo.toml" ]; then
            git clone --depth 1 https://github.com/nvandessel/sproink.git sproink-src-tmp
            if [ -d "sproink-build/target" ]; then
              mv sproink-build/target sproink-src-tmp/target
            fi
            rm -rf sproink-build
            mv sproink-src-tmp sproink-build
          fi
          BUILT_LIB="sproink-build/target/release/libsproink.a"
          # Always build — cached deps make this fast, and skipping can leave
          # a stale .a that is missing the FFI symbols (see #268).
          cd sproink-build
          CARGO_INCREMENTAL=0 cargo build --release --features ffi
          cd ..
          echo "Built: $BUILT_LIB ($(wc -c < "$BUILT_LIB") bytes)"
          mkdir -p third_party/sproink/lib/linux_amd64
          cp "$BUILT_LIB" third_party/sproink/lib/linux_amd64/libsproink.a

      - name: Build with CGO + LanceDB
        run: |
          PLATFORM="$(go env GOOS)_$(go env GOARCH)"
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I$(pwd)/include" \
          CGO_LDFLAGS="-L$(pwd)/lib/${PLATFORM} -Wl,-Bstatic -llancedb_go -Wl,-Bdynamic -L$(pwd)/third_party/sproink/lib/${PLATFORM} -lsproink -lm -ldl -lstdc++ -lpthread" \
          go build -ldflags "-s -w -X main.version=test-cgo" \
            -o floop-cgo ./cmd/floop

      - name: Verify CGO binary
        run: |
          ./floop-cgo --version
          echo ""
          echo "LanceDB static linking check:"
          ldd_output=$(ldd floop-cgo 2>&1) || { echo "FAIL: ldd failed"; exit 1; }
          if echo "$ldd_output" | grep -q liblancedb_go; then
            echo "FAIL: liblancedb_go.so linked dynamically"
            echo "$ldd_output"
            exit 1
          else
            echo "OK: LanceDB statically linked (no liblancedb_go.so dependency)"
          fi
