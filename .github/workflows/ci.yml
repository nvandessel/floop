name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Detect which files changed so we can skip code checks on docs-only PRs.
  # Jobs that are "skipped" via `if` still satisfy required status checks,
  # unlike jobs that never trigger due to paths-ignore.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!docs/**'

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Run tests
        if: matrix.os != 'ubuntu-latest'
        run: go test ./...
      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: go test -coverprofile=coverage.txt -covermode=atomic -coverpkg=./... ./...
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          fail_ci_if_error: false

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  security:
    name: Security
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    # govulncheck is now a hard gate — Go toolchain must stay current
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  build:
    name: Build (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Build with version info
        shell: bash
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -ldflags="-s -w -X main.version=dev -X main.commit=$COMMIT -X main.date=$DATE" ./cmd/floop

  test-cgo:
    name: Test (CGO + LanceDB, ${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            lib_dir: linux_amd64
            sproink_dir: linux_amd64
            extra_ldflags: ""
          - os: macos-latest
            lib_dir: darwin_arm64
            sproink_dir: darwin_arm64
            extra_ldflags: ""
          - os: windows-latest
            lib_dir: windows-gnu_amd64
            sproink_dir: windows_amd64
            extra_ldflags: "-lws2_32 -lntdll -luserenv -lbcrypt -Wl,--allow-multiple-definition"
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "1"
      CGO_CFLAGS: "-I${{ github.workspace }}/include"
      CGO_LDFLAGS: "-L${{ github.workspace }}/lib/${{ matrix.lib_dir }} -llancedb_go ${{ matrix.extra_ldflags }}"
      LD_LIBRARY_PATH: "${{ github.workspace }}/lib/${{ matrix.lib_dir }}"
      DYLD_LIBRARY_PATH: "${{ github.workspace }}/lib/${{ matrix.lib_dir }}"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Download Go modules
        run: go mod download
      - name: Cache LanceDB native libraries
        uses: actions/cache@v5
        with:
          path: |
            lib/
            include/
          key: lancedb-native-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.sum') }}
      - name: Download LanceDB native libraries
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -d "lib/" ]; then
            LANCE_VERSION=$(go list -m -f '{{if .Replace}}{{.Replace.Version}}{{else}}{{.Version}}{{end}}' github.com/lancedb/lancedb-go)
            gh release download "${LANCE_VERSION}" \
              --repo nvandessel/lancedb-go \
              --pattern 'lancedb-go-native-binaries.tar.gz'
            tar -xzf lancedb-go-native-binaries.tar.gz
            rm -f lancedb-go-native-binaries.tar.gz
          fi
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache sproink build
        uses: actions/cache@v5
        with:
          path: sproink-build/target
          key: sproink-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/sproink/include/sproink.h') }}
      - name: Build sproink native library
        shell: bash
        run: |
          # Clone if not a git repo (cache restores target/ but not .git)
          if [ ! -d "sproink-build/.git" ]; then
            rm -rf sproink-build
            git clone --depth 1 https://github.com/nvandessel/sproink.git sproink-build
          fi
          # Determine platform-specific artifact path
          if [ "$RUNNER_OS" = "Windows" ]; then
            BUILT_LIB="sproink-build/target/x86_64-pc-windows-gnu/release/libsproink.a"
          else
            BUILT_LIB="sproink-build/target/release/libsproink.a"
          fi
          # Build only if cached artifact is absent
          if [ ! -f "$BUILT_LIB" ]; then
            cd sproink-build
            if [ "$RUNNER_OS" = "Windows" ]; then
              rustup target add x86_64-pc-windows-gnu
              cargo build --release --target x86_64-pc-windows-gnu
            else
              cargo build --release
            fi
            cd ..
          fi
          # Always copy to third_party (not cached)
          mkdir -p third_party/sproink/lib/${{ matrix.sproink_dir }}
          cp "$BUILT_LIB" third_party/sproink/lib/${{ matrix.sproink_dir }}/libsproink.a
      - name: Add library path (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "${{ github.workspace }}/lib/${{ matrix.lib_dir }}" >> $GITHUB_PATH
      - name: Run CGO tests
        run: go test -race -count=1 ./...
