name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Detect which files changed so we can skip code checks on docs-only PRs.
  # Jobs that are "skipped" via `if` still satisfy required status checks,
  # unlike jobs that never trigger due to paths-ignore.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!docs/**'

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0" # LanceDB requires native libs; no-CGO stub falls back to BruteForce
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: make test

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0" # LanceDB requires native libs; no-CGO stub falls back to BruteForce
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  security:
    name: Security
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0" # LanceDB requires native libs; no-CGO stub falls back to BruteForce
    # govulncheck is now a hard gate — Go toolchain must stay current
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0" # LanceDB requires native libs; no-CGO stub falls back to BruteForce
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: make build
      - name: Cross-compile for Windows
        run: GOOS=windows GOARCH=amd64 go build -o floop.exe ./cmd/floop

  test-cgo:
    name: Test (CGO + LanceDB)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
      CGO_CFLAGS: "-I${{ github.workspace }}/include"
      CGO_LDFLAGS: "-L${{ github.workspace }}/lib/linux_amd64 -llancedb_go"
      LD_LIBRARY_PATH: "${{ github.workspace }}/lib/linux_amd64"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Download Go modules
        run: go mod download
      - name: Download LanceDB native libraries
        run: |
          LANCE_VERSION=$(go list -m -f '{{.Version}}' github.com/lancedb/lancedb-go)
          bash "$(go env GOMODCACHE)/github.com/lancedb/lancedb-go@${LANCE_VERSION}/scripts/download-artifacts.sh" "${LANCE_VERSION}"
      - name: Run CGO tests
        run: go test -race -count=1 ./...

  test-cgo-macos:
    name: Test (CGO + LanceDB, macOS)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    env:
      CGO_ENABLED: "1"
      CGO_CFLAGS: "-I${{ github.workspace }}/include"
      CGO_LDFLAGS: "-L${{ github.workspace }}/lib/darwin_arm64 -llancedb_go"
      DYLD_LIBRARY_PATH: "${{ github.workspace }}/lib/darwin_arm64"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Download Go modules
        run: go mod download
      - name: Download LanceDB native libraries
        run: |
          LANCE_VERSION=$(go list -m -f '{{.Version}}' github.com/lancedb/lancedb-go)
          bash "$(go env GOMODCACHE)/github.com/lancedb/lancedb-go@${LANCE_VERSION}/scripts/download-artifacts.sh" "${LANCE_VERSION}"
      - name: Run CGO tests
        run: go test -race -count=1 ./...
