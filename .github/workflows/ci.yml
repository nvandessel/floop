name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Detect which files changed so we can skip code checks on docs-only PRs.
  # Jobs that are "skipped" via `if` still satisfy required status checks,
  # unlike jobs that never trigger due to paths-ignore.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!docs/**'

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    # Windows tests are non-blocking until pre-existing failures are fixed.
    # Tracked: fl-xn7
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: go test ./...

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  security:
    name: Security
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    # govulncheck is now a hard gate — Go toolchain must stay current
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  build:
    name: Build (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    # Windows builds are non-blocking until pre-existing failures are fixed.
    # Tracked: fl-xn7
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Build with version info
        shell: bash
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -ldflags="-s -w -X main.version=dev -X main.commit=$COMMIT -X main.date=$DATE" ./cmd/floop

  test-cgo:
    name: Test (CGO + LanceDB)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
      CGO_CFLAGS: "-I${{ github.workspace }}/include"
      CGO_LDFLAGS: "-L${{ github.workspace }}/lib/linux_amd64 -llancedb_go"
      LD_LIBRARY_PATH: "${{ github.workspace }}/lib/linux_amd64"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Download Go modules
        run: go mod download
      - name: Download LanceDB native libraries
        run: |
          LANCE_VERSION=$(go list -m -f '{{.Version}}' github.com/lancedb/lancedb-go)
          bash "$(go env GOMODCACHE)/github.com/lancedb/lancedb-go@${LANCE_VERSION}/scripts/download-artifacts.sh" "${LANCE_VERSION}"
      - name: Run CGO tests
        run: go test -race -count=1 ./...
